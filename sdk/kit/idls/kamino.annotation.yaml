protocol:
  id: "kamino"
  displayName: "Kamino Lending"
  programAddress: "KLend2g3cP87ber8CzRaqeECGwNvLFM9acPVcRkRHvM"
  idlFile: "kamino-lending.json"
  idlCase: "camel"
  idlFormat: "old"

instructions:
  - idlName: "depositObligationCollateral"
    sdkName: "depositCollateral"
    actionType: "Deposit"
    isSpending: true
    category: "spending"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "collateralAmount"
        schemaFieldName: "collateralAmount"
    constrainableAccounts:
      - name: "depositReserve"

  - idlName: "withdrawObligationCollateralAndRedeemReserveCollateral"
    sdkName: "withdrawCollateral"
    actionType: "Withdraw"
    isSpending: false
    category: "riskReducing"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "collateralAmount"
        schemaFieldName: "collateralAmount"
    constrainableAccounts:
      - name: "withdrawReserve"

  - idlName: "borrowObligationLiquidity"
    sdkName: "borrowLiquidity"
    actionType: "RemoveCollateral"
    isSpending: false
    category: "riskReducing"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "liquidityAmount"
        schemaFieldName: "liquidityAmount"
    constrainableAccounts:
      - name: "borrowReserve"

  - idlName: "repayObligationLiquidity"
    sdkName: "repayLiquidity"
    actionType: "AddCollateral"
    isSpending: true
    category: "spending"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "liquidityAmount"
        schemaFieldName: "liquidityAmount"
    constrainableAccounts:
      - name: "repayReserve"

ruleTypes:
  - type: "maxAmount"
    displayName: "Max Amount"
    description: "Cap the maximum amount per instruction."
    applicableActions: ["depositCollateral", "borrowLiquidity", "repayLiquidity", "withdrawCollateral"]
    params:
      - name: "maxAmount"
        type: "bigint"
        label: "Maximum amount (base units)"
        required: true
    fieldMapping:
      depositCollateral: "collateralAmount"
      borrowLiquidity: "liquidityAmount"
      repayLiquidity: "liquidityAmount"
      withdrawCollateral: "collateralAmount"
    constraintType: "data"
    operator: "lte"

actionCategories:
  spending: ["depositCollateral", "repayLiquidity"]
  riskReducing: ["borrowLiquidity", "withdrawCollateral"]

markets:
  "USDC":
    reserve: "d4A2prbA2nCUrgXtTiE2LJFVL3UA2g9MoULwsAb59iN"
  "SOL":
    reserve: "d7Lga7boLNHKzVFd6cFDhMkb7R4JAtsZBH7AumvAn2E"
  "USDT":
    reserve: "H3t6qZ1JkguCNTi9uzVKqQ7dvt2cum4XiXWvzLcEFqJ"
  "JitoSOL":
    reserve: "EVbyEE9VKWH79b7FUEjaSoCpzSRzPfE9bAYoz5SbeVS"
  "mSOL":
    reserve: "BGgoMgWJ26X5KJ3fkfaCVKnaQqHe6C6GFnDo1CsPQJLy"
